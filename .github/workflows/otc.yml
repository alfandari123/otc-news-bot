name: OTC Scanner

on:
  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"


jobs:

  scan:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v5


      - name: Setup Python
        uses: actions/setup-python@v6

        with:
          python-version: "3.12"


      - name: Install requirements
        run: |
          pip install -r requirements.txt


      - name: Run scanner
        run: |
          python scanner.py
